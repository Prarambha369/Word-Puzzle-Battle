<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="A competitive turn-based word-building game. Place letters. Form words. Grow your roots." />
  <meta name="theme-color" content="#004643" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="Word Puzzle Battle" />
  <meta property="og:description" content="Place letters. Form words. First to 20 wins." />
  <meta property="og:type" content="website" />
  <title>Word Puzzle Battle — GROWTH v1.0.4</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <div class="logo-box">
      <div class="logo-mark">W</div>
    </div>
    <div class="system-status">
      <span class="status-line">ROOT SYSTEM</span>
      <span class="status-line">ACTIVE</span>
    </div>
    <div class="version-tag">GROWTH v1.0.4</div>
  </header>

  <main class="game-container">
    <div class="hud">
      <div class="player-card" id="p1-card">
        <span class="player-label">YOU</span>
        <span class="score" id="p1-score">0</span>
        <div class="progress-bar">
          <div class="progress-fill" id="p1-progress"></div>
        </div>
      </div>
      <div class="turn-badge" id="turn-badge">YOUR TURN</div>
      <div class="player-card right" id="p2-card">
        <span class="player-label" id="p2-label">OPPONENT</span>
        <span class="score" id="p2-score">0</span>
        <div class="progress-bar">
          <div class="progress-fill" id="p2-progress"></div>
        </div>
      </div>    </div>

    <div class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="Game board"></div>
    </div>

    <div class="action-bar">
      <button class="btn-ghost" id="btn-regrow" aria-label="Regrow board">
        <span class="btn-icon">↺</span>
        <span>REGROW</span>
      </button>
      <button class="btn-ghost" id="btn-sense" aria-label="Sense hint">
        <span class="btn-icon">💡</span>
        <span>SENSE</span>
      </button>
      <button class="btn-primary" id="btn-plant">
        <span>PLANT WORD</span>
      </button>
    </div>
  </main>

  <div class="modal-overlay hidden" id="letter-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2 class="sheet-title" id="modal-title">Place your letter</h2>
        <button class="sheet-close" id="modal-close" aria-label="Close modal">×</button>
      </div>
      <p class="sheet-subtitle" id="sheet-coords">ROW —, COLUMN —</p>
      <div class="letter-grid" id="letter-grid" role="listbox" aria-label="Letter selection"></div>
      <div class="hint-bar" id="hint-bar">
        <span class="hint-icon">🌿</span>
        <span class="hint-text">Select a letter to plant on the board</span>
      </div>
      <div class="sheet-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-place">PLANT</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="win-modal" role="dialog" aria-modal="true" aria-labelledby="win-title">
    <div class="win-card">
      <div class="win-badge" id="win-badge">VICTORY</div>
      <h2 class="win-title" id="win-title">Player 1 Wins!</h2>
      <div class="win-scores" id="win-scores"></div>
      <div class="win-last-word" id="win-last-word"></div>
      <button class="btn-primary" id="play-again">PLAY AGAIN</button>
      <button class="btn-ghost" id="return-roots">RETURN TO ROOTS</button>
    </div>  </div>

  <div class="ai-thinking hidden" id="ai-thinking">
    <span class="thinking-icon">🌱</span>
    <span>GROWING WORD TREE...</span>
  </div>

  <div class="menu-overlay hidden" id="menu-overlay">
    <div class="menu-card">
      <div class="menu-logo">
        <div class="logo-mark large">W</div>
      </div>
      <h1 class="menu-title">WORD PUZZLE BATTLE</h1>
      <p class="menu-subtitle">EXPANSION PROTOCOL INITIATED</p>
      
      <div class="difficulty-select">
        <p class="difficulty-label">SELECT DIFFICULTY</p>
        <div class="difficulty-segmented" role="radiogroup" aria-label="Difficulty selection">
          <button class="diff-btn selected" data-diff="easy" role="radio" aria-checked="true">EASY</button>
          <button class="diff-btn" data-diff="medium" role="radio" aria-checked="false">MED</button>
          <button class="diff-btn" data-diff="hard" role="radio" aria-checked="false">HARD</button>
        </div>
      </div>

      <button class="btn-primary large" id="menu-play-ai">
        <span class="btn-icon">🤖</span>
        PLAY VS AI
      </button>
      <button class="btn-ghost large" id="menu-play-friend">
        <span class="btn-icon">👥</span>
        PLAY VS FRIEND
      </button>

      <div class="menu-footer">
        <button class="menu-link" id="menu-settings">⚙ SETTINGS</button>
        <button class="menu-link" id="menu-help">? HOW TO PLAY</button>
      </div>

      <p class="menu-system">ROOT SYSTEM: ACTIVE | GROWTH v1.0.4</p>
    </div>
  </div>

  <script src="trie.js" defer></script>
  <script src="ai-bot.js" defer></script>
  <script src="game.js" defer></script>
  <script defer>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
    </html>
